ota_search:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID', 'lighthouse-dev') }}"
      dataset: ota_dbt
      location: EU
      threads: 4
    ci:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID', 'lighthouse-ci') }}"
      dataset: ota_dbt
      location: EU
      threads: 4
